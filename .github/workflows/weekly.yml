name: This Week's Releases

# Refreshes the page DAILY; notifies only on Fridays (manual runs always notify).
on:
  schedule:
    - cron: "0 15 * * *"   # daily 15:00 UTC = 11:00 EDT (10:00 EST in winter)
  workflow_dispatch: {}

# Needed for GitHub Pages deploys.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Fetches fresh from TMDB/IMDb and writes the HTML page. --cache here just
      # stores the resolved data on this runner so the Notify step can reuse it
      # (no second fetch); the runner is ephemeral, so every run still fetches fresh.
      - name: Generate page
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python3 this_weeks_releases.py --cache --html-out _site/index.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      # Page is now live — send the Pushcut notification linking to it.
      # Scheduled runs notify only on Fridays (--notify auto); manual runs always.
      # --cache reuses the data from the Generate step (no extra API calls).
      - name: Notify via Pushcut
        env:
          TMDB_API_KEY: unused-uses-cache
          PUSHCUT_WEBHOOK: ${{ secrets.PUSHCUT_WEBHOOK }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: python3 this_weeks_releases.py --cache --html-out '' --notify ${{ github.event_name == 'workflow_dispatch' && 'always' || 'auto' }}
